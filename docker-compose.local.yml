version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: .docker/local/Dockerfile
    container_name: st_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules
    ports:
      - "9000:9000"  # PHP-FPM
      - "5173:5173"  # Vite frontend
    networks:
      - network

  webserver:
    image: nginx:alpine
    container_name: st_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - ./.docker/local/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: st_db
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_DATABASE: st_tech_db
      MYSQL_USER: st_user
      MYSQL_PASSWORD: st_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - network

  queue:
    build:
      context: .
      dockerfile: .docker/local/Dockerfile
    container_name: st_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: ["php", "artisan", "queue:work"]
    networks:
      - network
    depends_on:
      - db
      - app

volumes:
  dbdata:
    driver: local

networks:
  network:
    driver: bridge
